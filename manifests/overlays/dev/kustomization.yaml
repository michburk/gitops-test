namespace: dev
namePrefix: dev-
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginx:latest
    target:
      kind: Deployment
      name: web
  - patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 8080
      - op: add
        path: /spec/ports/0/targetPort
        value: 80
    target:
      kind: Service
      name: web
  - patch: |-
      - op: replace
        path: /data/index.html
        value: |
          <html>
          <body>
          <h1>DEV</h1>
          </body>
          </html>
    target:
      kind: ConfigMap
      name: web-content

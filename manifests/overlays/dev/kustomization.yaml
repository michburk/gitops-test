namespace: dev
namePrefix: dev-
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginx:latest
    target:
      kind: Deployment
      name: web
  - patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 8080
    target:
      kind: Service
      name: web
